<div class="hero-wrapper">
  <app-particle-canvas
    bgColor="#FFFFFF"
    particleColor="rgba(67, 56, 202, 0.25)"
    lineColor="rgba(67, 56, 202,"
    lineColorHover="rgba(13, 148, 136,"
    [lineOpacityMultiplier]="0.3"
    [lineOpacityMultiplierHover]="0.5"
  />

  <section id="hero" class="hero-section">
    <div class="hero-content">
      <!-- Badge -->
      <div class="badge" appScrollAnimate animationDelay="0ms">
        <span class="pulse-dot"></span>
        Digitalagentur fürs Handwerk
      </div>

      <!-- Headline -->
      <h1 appScrollAnimate animationDelay="100ms">
        Dein Handwerk.<br>
        <span class="gradient-text">Unsere Technik.</span>
      </h1>

      <!-- Subtext -->
      <p class="hero-sub" appScrollAnimate animationDelay="200ms">
        Moderne Websites und maßgeschneiderte Web-Apps für Handwerksbetriebe –
        intelligent, effizient und mit KI-Power. Digitalisiere deinen Betrieb und gewinne mehr Kunden.
      </p>

      <!-- CTA Buttons -->
      <div class="hero-actions" appScrollAnimate animationDelay="300ms">
        <button class="btn-primary" (click)="scrollTo('kontakt')">
          Kostenlos beraten lassen
        </button>
        <button class="btn-secondary" (click)="scrollTo('referenzen')">
          Referenzen ansehen →
        </button>
      </div>
    </div>
  </section>
</div>
