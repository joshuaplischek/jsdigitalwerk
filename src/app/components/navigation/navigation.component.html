<nav class="nav-wrapper" [class.scrolled]="isScrolled()">
  <div class="nav-inner">
    <!-- Logo -->
    <div class="logo" (click)="navigateHome()">
      <div class="logo-mark">JS</div>
      <span class="logo-text">digitalwerk</span>
    </div>

    <!-- Desktop Nav Links -->
    <div class="nav-links">
      <button (click)="scrollTo('leistungen')">Leistungen</button>
      <button (click)="scrollTo('referenzen')">Referenzen</button>
      <button (click)="scrollTo('ueber-uns')">Über uns</button>
      <button (click)="scrollTo('faq')">FAQ</button>
    </div>

    <!-- CTA -->
    <div class="nav-cta">
      <button class="btn-primary" (click)="scrollTo('kontakt')">Projekt starten</button>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-toggle" (click)="isMobileMenuOpen.set(!isMobileMenuOpen())">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
    <div class="mobile-menu">
      <button (click)="scrollTo('leistungen')">Leistungen</button>
      <button (click)="scrollTo('referenzen')">Referenzen</button>
      <button (click)="scrollTo('ueber-uns')">Über uns</button>
      <button (click)="scrollTo('faq')">FAQ</button>
      <button class="btn-primary" (click)="scrollTo('kontakt')">Projekt starten</button>
    </div>
  }
</nav>
