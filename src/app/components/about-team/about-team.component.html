<section id="ueber-uns" class="about-section">
  <div class="container">
    <div class="section-header" appScrollAnimate>
      <h2>Über uns</h2>
      <p>Team members and also compile the family is listening.</p>
    </div>

    <div class="team-grid">
      @for (member of team; track member.name; let i = $index) {
        <div class="team-card" appScrollAnimate [animationDelay]="(i * 150) + 'ms'">
          <div class="avatar">{{ member.initials }}</div>
          <h3>{{ member.name }}</h3>
          <div class="role-badge">{{ member.role }}</div>
          <div class="tags">
            @for (tag of member.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>
          <p class="bio">{{ member.bio }}</p>
          <div class="fact-row">
            <span class="fact-icon">💡</span>
            <span class="fact-text">{{ member.fact }}</span>
          </div>
        </div>
      }
    </div>
  </div>
</section>
