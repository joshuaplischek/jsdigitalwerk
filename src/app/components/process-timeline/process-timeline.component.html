<section class="timeline-section">
  <div class="container">
    <div class="section-header" appScrollAnimate>
      <h2>So arbeiten wir</h2>
      <p>Vom ersten Anruf bis zur fertigen Website – so läuft ein Projekt bei uns ab.</p>
    </div>

    <div class="timeline-track" appScrollAnimate animationDelay="100ms">
      <!-- Connecting line -->
      <div class="track-line"></div>

      @for (step of steps; track step.number; let i = $index) {
        <div class="timeline-step">
          <div class="step-dot" [class.active]="i === 0">
            <span>{{ step.number }}</span>
          </div>
          <div class="step-content">
            <h3>{{ step.title }}</h3>
            <p>{{ step.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
